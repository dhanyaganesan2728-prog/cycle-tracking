<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — MyCycle</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="container header">
    <a class="brand" href="index.html"><div class="logo">MC</div><div><div style="font-weight:700">MyCycle</div><small style="color:var(--muted)">Period & Wellness Companion</small></div></a>
    <nav class="navlinks">
      <a href="features.html">Features</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p style="color:var(--muted)">Questions or feedback? Fill this form (example — backend not included).</p>

    <div style="margin-top:12px; max-width:720px;">
      <form action="#" method="post" onsubmit="alert('Form demo — integrate a backend to handle submissions'); return false;">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <input type="text" name="name" placeholder="Your name" required style="padding:10px; border-radius:10px; border:1px solid #f0dbe2;">
          <input type="email" name="email" placeholder="Email" required style="padding:10px; border-radius:10px; border:1px solid #f0dbe2;">
        </div>
        <div style="margin-top:10px;">
          <input type="text" name="subject" placeholder="Subject" style="padding:10px; width:100%; border-radius:10px; border:1px solid #f0dbe2;">
        </div>
        <div style="margin-top:10px;">
          <textarea name="message" rows="6" placeholder="Message" style="padding:12px; width:100%; border-radius:10px; border:1px solid #f0dbe2;"></textarea>
        </div>
        <div style="margin-top:12px;">
          <button class="btn" type="submit">Send Message</button>
        </div>
      </form>
    </div>

    <footer class="footer">© MyCycle</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
